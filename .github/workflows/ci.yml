name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      # Pinned so CI matches the formatting in the repo (versions differ in output).
      - run: pip install "clang-format==22.1.5"
      - run: clang-format --dry-run -Werror src/*.c src/*.h include/*.h tests/*.c

  test:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build & run unit tests
        run: |
          cmake -S tests -B build-tests -G Ninja
          cmake --build build-tests
          ctest --test-dir build-tests --output-on-failure

  build:
    name: Build firmware (RP2040)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        run: |
          sudo apt-get update
          # libusb-1.0-0-dev lets the Pico SDK auto-build picotool (needed for the .uf2)
          sudo apt-get install -y cmake ninja-build libusb-1.0-0-dev

      - name: Install Arm GNU toolchain (14.2.Rel1)
        uses: carlosperate/arm-none-eabi-gcc-action@0725d97b026acf7fc8e22dfd5bee912998879ba8 # v1
        with:
          release: "14.2.Rel1"

      - name: Fetch Pico SDK 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          # Only TinyUSB is needed for this firmware (USB device stack).
          git -C "$HOME/pico-sdk" submodule update --init --depth 1 lib/tinyusb
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> "$GITHUB_ENV"

      - name: Configure
        # Toolchain is on PATH (so no PICO_TOOLCHAIN_PATH needed); the SDK builds
        # picotool itself. env.sh isn't sourced — CI pins everything explicitly.
        run: cmake -S . -B build -G Ninja -DPICO_SDK_PATH="$PICO_SDK_PATH"

      - name: Build
        run: cmake --build build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dutler-firmware
          path: |
            build/dutler.uf2
            build/dutler.elf
          if-no-files-found: error
