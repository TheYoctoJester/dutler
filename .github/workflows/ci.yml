name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: every job only needs to read the checked-out code.
permissions:
  contents: read

# A newer push to the same ref cancels in-flight runs (saves minutes on rapid
# pushes; never cancels a different branch/PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      # Pinned so CI matches the formatting in the repo (versions differ in output).
      - run: pip install "clang-format==22.1.5"
      # git ls-files patterns recurse into subdirs (src/util/, tests/fakes/, …),
      # so new modules are covered automatically (mirrors check_spdx.sh). Vendored
      # Unity keeps its own formatting, so it is excluded.
      - run: clang-format --dry-run -Werror $(git ls-files 'src/*.c' 'src/*.h' 'include/*.h' 'tests/*.c' 'tests/*.h' ':(exclude)tests/vendor/*')

  spdx:
    name: SPDX headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: tools/check_spdx.sh

  lint:
    name: Lint scripts (shellcheck + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck $(git ls-files '*.sh')

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: ruff
        # Pinned so CI matches local results (ruff's rule set evolves between releases).
        run: |
          pip install "ruff==0.15.18"
          ruff check tools/*.py

  cppcheck:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version
      # Conservative enable set (no noisy "style"/"all"); inline suppressions allowed.
      - run: >
          cppcheck --enable=warning,performance,portability --inline-suppr
          --suppress=missingIncludeSystem --error-exitcode=1 --quiet
          -I include -I src src/

  test:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      # -Werror catches new warnings; sanitizers catch OOB / UB in the pure logic.
      - name: Build & run unit tests
        run: |
          cmake -S tests -B build-tests -G Ninja -DDUTLER_WERROR=ON -DDUTLER_SANITIZE=ON
          cmake --build build-tests
          ctest --test-dir build-tests --output-on-failure

  build:
    name: Build firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One codebase across the Pico family; the build adapts flash size at
        # runtime and skips the LED on wireless boards (no PICO_DEFAULT_LED_PIN).
        # Cover both axes: {RP2040, RP2350} x {wired LED, wireless no-LED}.
        #   pico     RP2040, LED        pico_w   RP2040, no LED
        #   pico2    RP2350, LED        pico2_w  RP2350, no LED
        board: [pico, pico_w, pico2, pico2_w]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build tools
        run: |
          sudo apt-get update
          # libusb-1.0-0-dev lets the Pico SDK auto-build picotool (needed for the .uf2)
          sudo apt-get install -y cmake ninja-build libusb-1.0-0-dev

      - name: Install Arm GNU toolchain (14.2.Rel1)
        uses: carlosperate/arm-none-eabi-gcc-action@98c40e51546516419841748d3210c290df0d2c6c # v1
        with:
          release: "14.2.Rel1"

      - name: Fetch Pico SDK 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          # Only TinyUSB is needed for this firmware (USB device stack).
          git -C "$HOME/pico-sdk" submodule update --init --depth 1 lib/tinyusb
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> "$GITHUB_ENV"

      - name: Configure
        # Toolchain is on PATH (so no PICO_TOOLCHAIN_PATH needed); the SDK builds
        # picotool itself. env.sh isn't sourced — CI pins everything explicitly.
        # -Werror is CI-only (local dev builds stay lenient).
        run: cmake -S . -B build -G Ninja -DPICO_SDK_PATH="$PICO_SDK_PATH" -DPICO_BOARD=${{ matrix.board }} -DDUTLER_WERROR=ON

      - name: Build
        run: cmake --build build

      - name: Firmware size
        # Visibility into flash/RAM footprint on each build (RP2040 is constrained).
        run: arm-none-eabi-size build/dutler.elf

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dutler-${{ matrix.board }}
          path: |
            build/dutler.uf2
            build/dutler.elf
          if-no-files-found: error
